name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: xvfb-run -a npm test
      - run: npm run package -- --out llama-vscode-chat-${{ github.ref_name }}.vsix
      - run: gh release create "${{ github.ref_name }}" "llama-vscode-chat-${{ github.ref_name }}.vsix" --generate-notes --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}
