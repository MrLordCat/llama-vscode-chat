name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: xvfb-run -a npm test
      - run: npm run package -- --out llama-vscode-chat.vsix
      - uses: actions/upload-artifact@v4
        with:
          name: llama-vscode-chat-vsix
          path: llama-vscode-chat.vsix
